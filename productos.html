<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Threads of Dawn</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand" onclick="window.location.href='productos.html'">
            <i class="fas fa-store"></i> Threads of Dawn
        </div>
        <ul class="nav-links">
            <li><a href="productos.html">Inicio</a></li>
            <li><a href="galeria.html">Galería</a></li>
            <li><a href="nosotros.html">Nosotros</a></li>
        </ul>
        <div class="nav-icons">
            <button class="icon-btn" onclick="window.location.href='favoritos.html'">
                <i class="fas fa-heart"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='carrito.html'">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge"></span>
            </button>
            <button class="icon-btn" onclick="window.location.href='perfil-usuario.html'">
                <i class="fas fa-user-circle"></i>
            </button>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </button>
            <button class="icon-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <!-- Búsqueda y Filtros -->
    <div class="search-filter-section">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Busca productos..." 
                onkeyup="handleSearch()"
            >
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="filter-wrapper">
            <select id="priceFilter" onchange="handlePriceFilter()">
                <option value="">Ordenar por precio</option>
                <option value="asc">Menor a Mayor</option>
                <option value="desc">Mayor a Menor</option>
            </select>
            <select id="categoryFilter" onchange="handleCategoryFilter()">
                <option value="">Todas las categorías</option>
                <option value="accesorios">Accesorios</option>
                <option value="ropa">Ropa</option>
                <option value="calzado">Calzado</option>
                <option value="bolsas">Bolsas</option>
                <option value="artesanía">Artesanía</option>
            </select>
        </div>
    </div>

    <!-- Galería de Productos -->
    <div class="products-grid" id="productsGrid"></div>

    <footer style="text-align: center; padding: 40px; background: rgba(139, 21, 56, 0.05); margin-top: 60px; color: var(--light-text);">
        <p>&copy; 2024 Threads of Dawn - Artesanías Mazahua Auténticas</p>
        <p>Cecytem | Plantel Villa de Allende</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Inicializar página
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            renderProducts('productsGrid');
            updateCartBadge();
        });

        let currentFilter = {
            search: '',
            price: '',
            category: ''
        };

        function handleSearch() {
            const query = document.getElementById('searchInput').value;
            currentFilter.search = query;
            applyFilters();
            
            if (query.length > 0) {
                const results = searchProducts(query);
                const searchResultsDiv = document.getElementById('searchResults');
                searchResultsDiv.innerHTML = results.map(p => `
                    <div class="search-result-item" onclick="selectSearchResult('${p.name}')">${p.name}</div>
                `).join('');
                searchResultsDiv.classList.add('active');
            } else {
                document.getElementById('searchResults').classList.remove('active');
            }
        }

        function handlePriceFilter() {
            const order = document.getElementById('priceFilter').value;
            currentFilter.price = order;
            applyFilters();
        }

        function handleCategoryFilter() {
            const category = document.getElementById('categoryFilter').value;
            currentFilter.category = category;
            applyFilters();
        }

        function selectSearchResult(name) {
            document.getElementById('searchInput').value = name;
            document.getElementById('searchResults').classList.remove('active');
            applyFilters();
        }

        function applyFilters() {
            let filtered = products;

            // Filtro de búsqueda
            if (currentFilter.search) {
                filtered = searchProducts(currentFilter.search);
            }

            // Filtro de categoría
            if (currentFilter.category) {
                filtered = filtered.filter(p => p.category === currentFilter.category);
            }

            // Filtro de precio
            if (currentFilter.price) {
                filtered = sortByPrice(filtered, currentFilter.price);
            }

            renderProducts('productsGrid', filtered);
        }
    </script>
</body>
</html>
